<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect to critical origins to remove ~316ms of latency (GTmetrix recommendation) -->
    <link rel="preconnect" href="https://ldydiabaczrjferglbar.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Self-referenced favicon (replaces the 41KB favicon.ico that was loaded twice) -->

    <!-- Inter font loaded from <link> (non-blocking, parallel with HTML parse) instead of CSS @import -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>

    <script>
      (() => {
        const fallbackTitle = 'Paid Media Dashboard';

        try {
          const cachedName = window.localStorage.getItem('app:clientName')?.trim();
          const title = cachedName ? `${cachedName} Paid Media Dashboard` : fallbackTitle;
          const titleElement = document.createElement('title');
          titleElement.textContent = title;
          document.head.appendChild(titleElement);
        } catch {
          const titleElement = document.createElement('title');
          titleElement.textContent = fallbackTitle;
          document.head.appendChild(titleElement);
        }
      })();
    </script>
    <meta name="description" content="AESA Analytics">
    <meta name="author" content="Lovable" />
