<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect to critical origins to remove ~316ms of latency (GTmetrix recommendation) -->
    <link rel="preconnect" href="https://ldydiabaczrjferglbar.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Self-referenced favicon (replaces the 41KB favicon.ico that was loaded twice) -->
    <link rel="icon" href="/brand/aroya-logo.png" type="image/png" />

    <!-- Inter font loaded from <link> (non-blocking, parallel with HTML parse) instead of CSS @import -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>

    <script>
      (() => {
        const fallbackTitle = 'Paid Media Dashboard';

        try {
          const cachedName = window.localStorage.getItem('app:clientName')?.trim();
          const title = cachedName ? `${cachedName} Paid Media Dashboard` : fallbackTitle;
          const titleElement = document.createElement('title');
          titleElement.textContent = title;
          document.head.appendChild(titleElement);
        } catch {
          const titleElement = document.createElement('title');
          titleElement.textContent = fallbackTitle;
          document.head.appendChild(titleElement);
        }
      })();
    </script>
    <meta name="description" content="Paid Media Dashboard">
    <meta name="author" content="Lovable" />

    <!-- TODO: Update og:title to match your application name -->
    
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/da9730a4-7b1b-4df1-90f2-fc4f5a34f6a0/id-preview-44aa130b--4005571c-f8a2-45e7-aefa-102fb024d337.lovable.app-1776079514731.png">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/da9730a4-7b1b-4df1-90f2-fc4f5a34f6a0/id-preview-44aa130b--4005571c-f8a2-45e7-aefa-102fb024d337.lovable.app-1776079514731.png">
    
  
  
  
  
  
  
  
  
  
  
  
  <meta property="og:title" content="Paid Media Dashboard">
  <meta name="twitter:title" content="Paid Media Dashboard">
  <meta property="og:description" content="Paid Media Dashboard">
  <meta name="twitter:description" content="Paid Media Dashboard">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
